---
- hosts: localhost
  gather_facts: false
  tasks:
    # FACTS #######################################################################
    - name: 'Set Known Facts'
      set_fact:
        pgrole: 'ollama'
        intport: '11434'
        extport: '11434'
        image: 'ollama/ollama:latest'
        ollama_profile: 'cpu'

    # CORE (MANDATORY) ############################################################
    - name: 'Including cron job'
      include_tasks: '/opt/communityapps/apps/_core.yml'

    - name: 'Setting {{pgrole}} Volumes'
      set_fact:
        pg_volumes:
          - '/opt/appdata/{{pgrole}}:/root/.ollama'
          - '/etc/localtime:/etc/localtime:ro'

    - name: 'Setting {{pgrole}} ENV'
      set_fact:
        pg_env:
          OLLAMA_LOAD_TIMEOUT: '-1'
          OLLAMA_KEEP_ALIVE: '-1'
          OLLAMA_HOST: '0.0.0.0:11434'

    - name: 'Setting {{pgrole}} ENV (GPU)'
      set_fact:
        pg_env_gpu: '{{ pg_env | combine({"NVIDIA_DRIVER_CAPABILITIES": "all"}) }}'

    # MAIN DEPLOYMENT #############################################################
    - name: 'Removing CPU {{pgrole}} container when GPU mode is selected'
      docker_container:
        name: '{{pgrole}}-cpu'
        state: absent
      when: ollama_profile == 'gpu'

    - name: 'Removing GPU {{pgrole}} container when CPU mode is selected'
      docker_container:
        name: '{{pgrole}}'
        state: absent
      when: ollama_profile == 'cpu'

    - name: 'Deploying {{pgrole}} (GPU mode)'
      docker_container:
        name: '{{pgrole}}'
        image: '{{image}}'
        pull: yes
        command: 'serve'
        published_ports:
          - '{{ports.stdout}}{{extport}}:{{intport}}'
        volumes: '{{pg_volumes}}'
        env: '{{pg_env_gpu}}'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - '{{pgrole}}'
              - 'ollama'
        device_requests:
          - capabilities:
              - - gpu
        state: started
      when: ollama_profile == 'gpu'

    - name: 'Deploying {{pgrole}} (CPU mode)'
      docker_container:
        name: '{{pgrole}}-cpu'
        image: '{{image}}'
        pull: yes
        command: 'serve'
        published_ports:
          - '{{ports.stdout}}{{extport}}:{{intport}}'
        volumes: '{{pg_volumes}}'
        env: '{{pg_env}}'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - '{{pgrole}}-cpu'
              - 'ollama'
        state: started
      when: ollama_profile == 'cpu'

    - name: 'Waiting for Ollama API to be ready'
      command: docker run --rm --network plexguide {{image}} sh -lc 'OLLAMA_HOST=ollama:11434 ollama list'
      register: ollama_ready
      changed_when: false
      retries: 30
      delay: 2
      until: ollama_ready.rc == 0

    - name: 'Pulling starter model for Ollama'
      command: docker run --rm --network plexguide -v /opt/appdata/{{pgrole}}:/root/.ollama {{image}} sh -lc 'OLLAMA_HOST=ollama:11434 ollama pull gemma3:4b'
      register: ollama_model_pull
      changed_when: "'already exists' not in ollama_model_pull.stdout"


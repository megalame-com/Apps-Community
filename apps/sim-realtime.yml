---
- hosts: localhost
  gather_facts: false
  tasks:
    # FACTS #######################################################################
    - name: 'Set Known Facts'
      set_fact:
        pgrole: 'sim-realtime'
        intport: '3002'
        extport: '3002'
        image: 'ghcr.io/simstudioai/realtime:latest'
        postgres_user: 'postgres'
        postgres_password: 'postgres'
        postgres_db: 'simstudio'

    # CORE (MANDATORY) ############################################################
    - name: 'Including cron job'
      include_tasks: '/opt/communityapps/apps/_core.yml'

    # LABELS ######################################################################
    - name: 'Adding Traefik'
      set_fact:
        pg_labels:
          traefik.enable: 'true'
          traefik.port: '{{intport}}'
          traefik.frontend.auth.forward.address: '{{gauth}}'
          traefik.frontend.rule: 'Host:{{pgrole}}.{{domain.stdout}}{{tldset}}{{cname}}'
          traefik.frontend.headers.SSLHost: '{{domain.stdout}}'
          traefik.frontend.headers.SSLRedirect: 'true'
          traefik.frontend.headers.STSIncludeSubdomains: 'true'
          traefik.frontend.headers.STSPreload: 'true'
          traefik.frontend.headers.STSSeconds: '315360000'
          traefik.frontend.headers.browserXSSFilter: 'true'
          traefik.frontend.headers.contentTypeNosniff: 'true'
          traefik.frontend.headers.customResponseHeaders: 'X-Robots-Tag:noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex'
          traefik.frontend.headers.forceSTSHeader: 'true'

    - name: 'Generating better-auth secret'
      set_fact:
        sim_better_auth_secret: "{{ lookup('password', '/opt/appdata/sim/.better_auth_secret length=32 chars=hex') }}"
      no_log: true

    - name: 'Generating internal API secret'
      set_fact:
        sim_internal_api_secret: "{{ lookup('password', '/opt/appdata/sim/.internal_api_secret length=32 chars=hex') }}"
      no_log: true

    - name: 'Setting {{pgrole}} ENV'
      set_fact:
        pg_env:
          NODE_ENV: 'production'
          DATABASE_URL: 'postgresql://{{postgres_user}}:{{postgres_password}}@sim-db:5432/{{postgres_db}}'
          NEXT_PUBLIC_APP_URL: 'https://sim.{{domain.stdout}}'
          BETTER_AUTH_URL: 'https://sim.{{domain.stdout}}'
          BETTER_AUTH_SECRET: '{{sim_better_auth_secret}}'
          INTERNAL_API_SECRET: '{{sim_internal_api_secret}}'
          REDIS_URL: 'redis://sim-redis:6379'

    # MAIN DEPLOYMENT #############################################################
    - name: 'Deploying {{pgrole}}'
      docker_container:
        name: '{{pgrole}}'
        image: '{{image}}'
        pull: yes
        published_ports:
          - '{{ports.stdout}}{{extport}}:{{intport}}'
        env: '{{pg_env}}'
        memory: '1G'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - '{{pgrole}}'
              - 'sim-realtime'
        state: started
        labels: '{{pg_labels}}'

##PG-Community

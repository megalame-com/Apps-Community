#!/bin/bash
#
# Title:      latitude
# Author(s):  generated
# URL:        https://docs.latitude.so/deployment/single-host
# GNU:        General Public License v3.0
################################################################################
---
- hosts: localhost
  gather_facts: false
  tasks:
    # FACTS #######################################################################
    - name: 'Set Known Facts'
      set_fact:
        pgrole: 'latitude'
        intport: '3000'
        extport: '5973'
        image: 'latitudedata/web:latest'
        image_migrations: 'latitudedata/migrations:latest'
        image_db: 'pgvector/pgvector:pg17'
        image_clickhouse: 'clickhouse/clickhouse-server:latest'
        image_redis: 'redis:7-alpine'
        image_temporal: 'temporalio/auto-setup:latest'
        image_seaweedfs: 'chrislusf/seaweedfs:latest'

    # CORE (MANDATORY) ############################################################
    - name: 'Including cron job'
      include_tasks: '/opt/communityapps/apps/_core.yml'

    # LABELS ######################################################################
    - name: 'Adding Traefik'
      set_fact:
        pg_labels:
          traefik.enable: 'true'
          traefik.port: '{{intport}}'
          traefik.frontend.auth.forward.address: '{{gauth}}'
          traefik.frontend.rule: 'Host:{{pgrole}}.{{domain.stdout}}{{tldset}}{{cname}}'
          traefik.frontend.headers.SSLHost: '{{domain.stdout}}'
          traefik.frontend.headers.SSLRedirect: 'true'
          traefik.frontend.headers.STSIncludeSubdomains: 'true'
          traefik.frontend.headers.STSPreload: 'true'
          traefik.frontend.headers.STSSeconds: '315360000'
          traefik.frontend.headers.browserXSSFilter: 'true'
          traefik.frontend.headers.contentTypeNosniff: 'true'
          traefik.frontend.headers.customResponseHeaders: 'X-Robots-Tag:noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex'
          traefik.frontend.headers.forceSTSHeader: 'true'

    - name: 'Generating master encryption key'
      set_fact:
        latitude_master_encryption_key: "{{ lookup('password', '/opt/appdata/latitude/.lat_master_encryption_key length=64 chars=hex') }}"
      no_log: true

    - name: 'Generating better-auth secret'
      set_fact:
        latitude_better_auth_secret: "{{ lookup('password', '/opt/appdata/latitude/.lat_better_auth_secret_v2 length=64 chars=ascii_letters,digits') }}"
      no_log: true

    - name: 'Generating database password'
      set_fact:
        latitude_postgres_password: "{{ lookup('password', '/opt/appdata/latitude/.postgres_password length=32 chars=ascii_letters,digits') }}"
      no_log: true

    - name: 'Generating clickhouse password'
      set_fact:
        latitude_clickhouse_password: "{{ lookup('password', '/opt/appdata/latitude/.clickhouse_password length=32 chars=ascii_letters,digits') }}"
      no_log: true

    - name: 'Generating storage secret key'
      set_fact:
        latitude_storage_secret_key: "{{ lookup('password', '/opt/appdata/latitude/.storage_secret_key length=32 chars=ascii_letters,digits') }}"
      no_log: true

    - name: 'Setting latitude database ENV'
      set_fact:
        latitude_db_env:
          POSTGRES_USER: 'latitude'
          POSTGRES_PASSWORD: '{{latitude_postgres_password}}'
          POSTGRES_DB: 'latitude'

    - name: 'Setting latitude clickhouse ENV'
      set_fact:
        latitude_clickhouse_env:
          CLICKHOUSE_DB: 'latitude'
          CLICKHOUSE_USER: 'latitude'
          CLICKHOUSE_PASSWORD: '{{latitude_clickhouse_password}}'

    - name: 'Setting latitude temporal ENV'
      set_fact:
        latitude_temporal_env:
          DB: 'postgres12'
          DB_PORT: '5432'
          POSTGRES_USER: 'latitude'
          POSTGRES_PWD: '{{latitude_postgres_password}}'
          POSTGRES_SEEDS: 'latitude-database'

    - name: 'Setting {{pgrole}} ENV'
      set_fact:
        pg_env:
          LAT_NODE_ENV: 'production'
          # Use public domain URLs so OAuth callbacks are not generated with localhost.
          LAT_WEB_URL: 'https://{{pgrole}}.{{domain.stdout}}'
          # In this reduced deployment there is no separate api/ingest container.
          LAT_API_URL: 'https://{{pgrole}}.{{domain.stdout}}'
          LAT_INGEST_URL: 'https://{{pgrole}}.{{domain.stdout}}'
          LAT_TRUSTED_ORIGINS: 'https://{{pgrole}}.{{domain.stdout}}'
          LAT_CORS_ALLOWED_ORIGINS: 'https://{{pgrole}}.{{domain.stdout}}'
          LAT_WEB_PORT: '{{intport}}'
          # Keep admin URL on the same DB/user in this reduced deployment to avoid role drift
          # with previously initialized persistent volumes.
          LAT_DATABASE_URL: 'postgresql://latitude:{{latitude_postgres_password}}@latitude-database:5432/latitude'
          LAT_ADMIN_DATABASE_URL: 'postgresql://latitude:{{latitude_postgres_password}}@latitude-database:5432/latitude'
          LAT_REDIS_HOST: 'latitude-redis'
          LAT_REDIS_PORT: '6379'
          LAT_BULLMQ_HOST: 'latitude-redis'
          LAT_BULLMQ_PORT: '6379'
          LAT_TEMPORAL_ADDRESS: 'latitude-temporal:7233'
          LAT_TEMPORAL_HOST: 'latitude-temporal'
          LAT_TEMPORAL_PORT: '7233'
          LAT_CLICKHOUSE_HOST: 'latitude-clickhouse'
          LAT_CLICKHOUSE_PORT: '8123'
          LAT_CLICKHOUSE_DB: 'latitude'
          LAT_CLICKHOUSE_USER: 'latitude'
          LAT_CLICKHOUSE_PASSWORD: '{{latitude_clickhouse_password}}'
          LAT_CLICKHOUSE_URL: 'http://latitude:{{latitude_clickhouse_password}}@latitude-clickhouse:8123/latitude'
          LAT_CLICKHOUSE_MIGRATION_URL: 'http://latitude:{{latitude_clickhouse_password}}@latitude-clickhouse:8123/latitude'
          LAT_STORAGE_PROVIDER: 's3'
          LAT_STORAGE_S3_ENDPOINT: 'http://latitude-seaweedfs:8333'
          LAT_STORAGE_S3_REGION: 'us-east-1'
          LAT_STORAGE_S3_BUCKET: 'latitude'
          LAT_STORAGE_S3_ACCESS_KEY_ID: 'latitude'
          LAT_STORAGE_S3_SECRET_ACCESS_KEY: '{{latitude_storage_secret_key}}'
          LAT_STORAGE_S3_FORCE_PATH_STYLE: 'true'
          LAT_MASTER_ENCRYPTION_KEY: '{{latitude_master_encryption_key}}'
          LAT_BETTER_AUTH_SECRET: '{{latitude_better_auth_secret}}'
          BETTER_AUTH_SECRET: '{{latitude_better_auth_secret}}'
          # Optional OAuth SSO providers (set full values to enable social login).
          # LAT_GOOGLE_CLIENT_ID: 'your-google-client-id'
          # LAT_GOOGLE_CLIENT_SECRET: 'your-google-client-secret'
          LAT_GITHUB_CLIENT_ID: 'Iv23liivAHqEKVYkQyZP'
          LAT_GITHUB_CLIENT_SECRET: 'ee3257760626fa3e7eb876f779a66738a7ae6e72'
          # Optional sign-in restriction to a single domain.
          # LAT_ALLOWED_EMAIL_DOMAIN: 'example.com'

    # MAIN DEPLOYMENT #############################################################
    - name: 'Ensuring latitude postgres data permissions'
      file:
        path: '/opt/appdata/latitude/database'
        state: directory
        owner: '999'
        group: '999'
        mode: '0700'
        recurse: true

    - name: 'Deploying latitude-database'
      docker_container:
        name: 'latitude-database'
        image: '{{image_db}}'
        pull: yes
        env: '{{latitude_db_env}}'
        volumes:
          - '/opt/appdata/latitude/database:/var/lib/postgresql/data'
          - '/etc/localtime:/etc/localtime:ro'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - 'latitude-database'
              - 'postgres'
        state: started

    - name: 'Deploying latitude-clickhouse'
      docker_container:
        name: 'latitude-clickhouse'
        image: '{{image_clickhouse}}'
        pull: yes
        env: '{{latitude_clickhouse_env}}'
        volumes:
          - '/opt/appdata/latitude/clickhouse:/var/lib/clickhouse'
          - '/etc/localtime:/etc/localtime:ro'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - 'latitude-clickhouse'
              - 'clickhouse'
        state: started

    - name: 'Deploying latitude-redis'
      docker_container:
        name: 'latitude-redis'
        image: '{{image_redis}}'
        pull: yes
        command: 'redis-server --appendonly yes'
        volumes:
          - '/opt/appdata/latitude/redis:/data'
          - '/etc/localtime:/etc/localtime:ro'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - 'latitude-redis'
              - 'redis'
        state: started

    - name: 'Deploying latitude-temporal'
      docker_container:
        name: 'latitude-temporal'
        image: '{{image_temporal}}'
        pull: yes
        env: '{{latitude_temporal_env}}'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - 'latitude-temporal'
              - 'temporal'
        state: started

    - name: 'Deploying latitude-seaweedfs'
      docker_container:
        name: 'latitude-seaweedfs'
        image: '{{image_seaweedfs}}'
        pull: yes
        command: 'server -s3 -dir /data -ip.bind=0.0.0.0 -s3.port=8333'
        volumes:
          - '/opt/appdata/latitude/seaweedfs:/data'
          - '/etc/localtime:/etc/localtime:ro'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - 'latitude-seaweedfs'
              - 'seaweedfs'
        state: started

    - name: 'Removing old latitude-migrations container'
      docker_container:
        name: 'latitude-migrations'
        state: absent
      ignore_errors: true

    - name: 'Running latitude-migrations'
      docker_container:
        name: 'latitude-migrations'
        image: '{{image_migrations}}'
        pull: yes
        env: '{{pg_env}}'
        restart_policy: 'no'
        detach: false
        cleanup: true
        networks:
          - name: plexguide
            aliases:
              - 'latitude-migrations'
              - 'migrations'
        state: started
      register: latitude_migration_run
      retries: 6
      delay: 8
      until: latitude_migration_run is succeeded
      ignore_errors: true

    - name: 'Deploying {{pgrole}}'
      docker_container:
        name: '{{pgrole}}'
        image: '{{image}}'
        pull: yes
        env: '{{pg_env}}'
        published_ports:
          - '{{ports.stdout}}{{extport}}:{{intport}}'
        volumes:
          - '/etc/localtime:/etc/localtime:ro'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - '{{pgrole}}'
        state: started
        labels: '{{pg_labels}}'

##PG-Community

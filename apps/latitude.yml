#!/bin/bash
#
# Title:      latitude
# Author(s):  generated
# URL:        https://docs.latitude.so/deployment/single-host
# GNU:        General Public License v3.0
################################################################################
---
- hosts: localhost
  gather_facts: false
  tasks:
    # FACTS #######################################################################
    - name: 'Set Known Facts'
      set_fact:
        pgrole: 'latitude'
        intport: '3000'
        extport: '5973'
        image: 'latitudedata/web:latest'
        image_db: 'pgvector/pgvector:pg17'

    # CORE (MANDATORY) ############################################################
    - name: 'Including cron job'
      include_tasks: '/opt/communityapps/apps/_core.yml'

    # LABELS ######################################################################
    - name: 'Adding Traefik'
      set_fact:
        pg_labels:
          traefik.enable: 'true'
          traefik.port: '{{intport}}'
          traefik.frontend.auth.forward.address: '{{gauth}}'
          traefik.frontend.rule: 'Host:{{pgrole}}.{{domain.stdout}}{{tldset}}{{cname}}'
          traefik.frontend.headers.SSLHost: '{{domain.stdout}}'
          traefik.frontend.headers.SSLRedirect: 'true'
          traefik.frontend.headers.STSIncludeSubdomains: 'true'
          traefik.frontend.headers.STSPreload: 'true'
          traefik.frontend.headers.STSSeconds: '315360000'
          traefik.frontend.headers.browserXSSFilter: 'true'
          traefik.frontend.headers.contentTypeNosniff: 'true'
          traefik.frontend.headers.customResponseHeaders: 'X-Robots-Tag:noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex'
          traefik.frontend.headers.forceSTSHeader: 'true'

    - name: 'Generating master encryption key'
      set_fact:
        latitude_master_encryption_key: "{{ lookup('password', '/opt/appdata/latitude/.lat_master_encryption_key length=64 chars=hex') }}"
      no_log: true

    - name: 'Generating better-auth secret'
      set_fact:
        latitude_better_auth_secret: "{{ lookup('password', '/opt/appdata/latitude/.lat_better_auth_secret length=64 chars=hex') }}"
      no_log: true

    - name: 'Generating database password'
      set_fact:
        latitude_postgres_password: "{{ lookup('password', '/opt/appdata/latitude/.postgres_password length=32 chars=ascii_letters,digits') }}"
      no_log: true

    - name: 'Setting latitude database ENV'
      set_fact:
        latitude_db_env:
          POSTGRES_USER: 'latitude'
          POSTGRES_PASSWORD: '{{latitude_postgres_password}}'
          POSTGRES_DB: 'latitude'

    - name: 'Setting {{pgrole}} ENV'
      set_fact:
        pg_env:
          LAT_NODE_ENV: 'production'
          # Local URLs prevent cookie/session mismatches when accessing http://localhost:3000 directly.
          LAT_WEB_URL: 'http://localhost:{{intport}}'
          LAT_API_URL: 'http://localhost:3001'
          LAT_INGEST_URL: 'http://localhost:3002'
          LAT_TRUSTED_ORIGINS: 'http://localhost:{{intport}},https://{{pgrole}}.{{domain.stdout}}'
          LAT_CORS_ALLOWED_ORIGINS: 'http://localhost:{{intport}},https://{{pgrole}}.{{domain.stdout}}'
          LAT_WEB_PORT: '{{intport}}'
          LAT_DATABASE_URL: 'postgresql://latitude:{{latitude_postgres_password}}@latitude-database:5432/latitude'
          LAT_ADMIN_DATABASE_URL: 'postgresql://postgres:{{latitude_postgres_password}}@latitude-database:5432/postgres'
          LAT_MASTER_ENCRYPTION_KEY: '{{latitude_master_encryption_key}}'
          LAT_BETTER_AUTH_SECRET: '{{latitude_better_auth_secret}}'
          BETTER_AUTH_SECRET: '{{latitude_better_auth_secret}}'

    # MAIN DEPLOYMENT #############################################################
    - name: 'Deploying latitude-database'
      docker_container:
        name: 'latitude-database'
        image: '{{image_db}}'
        pull: yes
        env: '{{latitude_db_env}}'
        volumes:
          - '/opt/appdata/latitude/database:/var/lib/postgresql/data'
          - '/etc/localtime:/etc/localtime:ro'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - 'latitude-database'
              - 'postgres'
        state: started

    - name: 'Deploying {{pgrole}}'
      docker_container:
        name: '{{pgrole}}'
        image: '{{image}}'
        pull: yes
        env: '{{pg_env}}'
        published_ports:
          - '{{ports.stdout}}{{extport}}:{{intport}}'
        volumes:
          - '/etc/localtime:/etc/localtime:ro'
        restart_policy: unless-stopped
        networks:
          - name: plexguide
            aliases:
              - '{{pgrole}}'
        state: started
        labels: '{{pg_labels}}'

##PG-Community
